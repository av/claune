            scrollbar-darkshadow-color: #0000ff;

        /* Modern WebKit Equivalents */
        ::-webkit-scrollbar {
            width: 24px;
            height: 24px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
            border: 3px inset #00ff00;
