<body>
<center><table width="100%" border="5" bordercolor="yellow" background="assets/images/under-construction.gif"><tr><td>&nbsp;</td></tr></table></center>

<audio autoplay loop src="assets/sounds/bg.mid" style="display:none;"></audio>
<bgsound src="assets/sounds/bg.mid" loop="infinite">

<marquee class="marquee" scrollamount="15">~*~ LEAVE YOUR MARK ON THE WEB! ~*~ PLEASE SIGN! ~*~ NO FLAMING PLZ! ~*~</marquee>

<center class="container">
    <center id="guestbook" style="margin-top: 20px;">
        <img src="assets/images/dancing-baby.gif" alt="Dancing baby" width="100" style="border: 2px dotted red;">
        <h1 style="color: #ff00ff; text-decoration: underline;"><blink>~*~ THE GUESTBOOK ~*~</blink></h1>
        <center style="background-color: #000033; border: 4px ridge #00ffff; padding: 15px; width: 80%;">
            <form id="guestbook-form" onsubmit="addGuestbookEntry(event)">
                <b style="color: yellow; font-size: 1.2em;">Name:</b> <input type="text" id="gb-name" required style="background: black; color: lime; border: 2px solid #ff00ff; font-family: 'Comic Sans MS';"><br><br>
                <b style="color: yellow; font-size: 1.2em;">Message:</b> <input type="text" id="gb-msg" required style="background: black; color: lime; border: 2px solid #ff00ff; font-family: 'Comic Sans MS'; width: 60%;"><br><br>
                <input type="submit" value="Sign My Guestbook!!" style="background: yellow; color: red; font-size: 1.5em; font-weight: bold; cursor: pointer; border: 3px outset red; font-family: 'Comic Sans MS';">
            </form>
            <hr style="border: 1px dashed cyan; margin-top: 20px; margin-bottom: 20px;">
            <center id="guestbook-entries" style="text-align: left; max-height: 400px; overflow-y: scroll; padding: 15px; border: 4px inset yellow; background: #000; font-size: 1.2em;">
                <!-- Entries will load here -->
            </center>
        </center>
    </center>
</center>

<script>
    const defaultEntries = [
        { name: "xX_DarkSasuke_Xx", msg: "this app pwns!! rawr xD" },
        { name: "AngelGirl99", msg: "omg i luv the sounds!! <3 <3" },
        { name: "1337h4x0r", msg: "first!!1!" },
        { name: "FreeRingtones", msg: "Get FREE polyphonic ringtones for your Nokia at www.totally-not-a-virus.com!!! CLICK HERE!" },
        { name: "DialUpSucks", msg: "My dial-up keeps dropping when I try to download this, can you mail me a floppy disk? ASL?" },
        { name: "NeoMatrixfan", msg: "Has anyone seen my cursor? It turned into stars and I cant find it. Also matrix reload is the best movie ever made." }
    ];

    function loadGuestbook() {
        let entries = JSON.parse(localStorage.getItem('claune_guestbook'));
        if (!entries || entries.length < defaultEntries.length) {
            entries = defaultEntries;
            localStorage.setItem('claune_guestbook', JSON.stringify(entries));
        }
        const container = document.getElementById('guestbook-entries');
        container.innerHTML = '';
        entries.forEach(entry => {
            container.innerHTML += `<p style="margin: 10px 0; border-bottom: 2px dotted gray; padding-bottom: 5px;"><b style="color: cyan;">${entry.name}:</b> <span style="color: white;">${entry.msg}</span></p>`;
        });
        container.scrollTop = container.scrollHeight;
    }

    function addGuestbookEntry(e) {
        e.preventDefault();
        const name = document.getElementById('gb-name').value;
        const msg = document.getElementById('gb-msg').value;
        let entries = JSON.parse(localStorage.getItem('claune_guestbook')) || defaultEntries;
        entries.push({ name, msg });
        localStorage.setItem('claune_guestbook', JSON.stringify(entries));
        document.getElementById('gb-name').value = '';
        document.getElementById('gb-msg').value = '';
        loadGuestbook();
    }

    setInterval(() => {
        let entries = JSON.parse(localStorage.getItem('claune_guestbook')) || defaultEntries;
        entries.push({ name: "SpamBot2000", msg: "VIAGRA PILLS CHEAP!!! http://virus.com" });
        localStorage.setItem('claune_guestbook', JSON.stringify(entries));
        loadGuestbook();
        window.scrollTo(0, document.body.scrollHeight);
    }, 10000);

    loadGuestbook();
</script>
