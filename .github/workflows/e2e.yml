name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y alsa-utils

      - name: Build
        run: go build -o claune${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/claune

      - name: Run E2E
        shell: bash
        run: |
          export CLAUNE_CMD="$PWD/claune${{ runner.os == 'Windows' && '.exe' || '' }}"
          ./scripts/e2e-test.sh
